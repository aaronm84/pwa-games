<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <!-- Background (rx swapped to 0 for the full-bleed maskable variant) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#2e2140"/>

  <!-- Fanned cards behind -->
  <g transform="rotate(-18 256 300)">
    <rect x="150" y="170" width="150" height="210" rx="18" fill="#e9e4f2" stroke="#b9aed0" stroke-width="3"/>
  </g>
  <g transform="rotate(16 256 300)">
    <rect x="212" y="170" width="150" height="210" rx="18" fill="#f3eff8" stroke="#b9aed0" stroke-width="3"/>
  </g>

  <!-- Front card -->
  <g>
    <rect x="181" y="150" width="150" height="218" rx="18" fill="#ffffff" stroke="#cdbfe0" stroke-width="3"/>
    <!-- Corner rank -->
    <text x="200" y="192" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#e8503a">A</text>
    <!-- Big heart pip -->
    <path d="M256,330
             C 256,330 196,288 196,250
             C 196,228 214,214 232,214
             C 245,214 254,222 256,232
             C 258,222 267,214 280,214
             C 298,214 316,228 316,250
             C 316,288 256,330 256,330 Z"
          fill="#e8503a"/>
  </g>

  <!-- Poker chip accent -->
  <circle cx="346" cy="356" r="42" fill="#3fb0c8" stroke="#ffffff" stroke-width="6" stroke-dasharray="14 12"/>
  <circle cx="346" cy="356" r="22" fill="#2e8aa0"/>
</svg>
