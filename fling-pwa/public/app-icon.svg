<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <!-- Background (rx swapped to 0 for the full-bleed maskable variant) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#3a6ea5"/>

  <!-- Ground -->
  <rect x="0" y="430" width="512" height="82" fill="#5a8f4e"/>
  <rect x="0" y="430" width="512" height="14" fill="#6aa85c"/>

  <!-- Wooden tower on the right -->
  <g>
    <rect x="330" y="300" width="36" height="130" rx="6" fill="#b07b3e"/>
    <rect x="412" y="300" width="36" height="130" rx="6" fill="#b07b3e"/>
    <rect x="320" y="266" width="138" height="34" rx="6" fill="#caa15c"/>
  </g>
  <!-- Target perched on the tower -->
  <circle cx="389" cy="228" r="38" fill="#3fbf5f"/>
  <circle cx="377" cy="220" r="9" fill="#fff"/>
  <circle cx="401" cy="220" r="9" fill="#fff"/>
  <circle cx="377" cy="222" r="4.5" fill="#1c2b1c"/>
  <circle cx="401" cy="222" r="4.5" fill="#1c2b1c"/>

  <!-- Trajectory arc -->
  <path d="M150,300 Q280,120 389,200" fill="none" stroke="rgba(255,255,255,0.55)"
        stroke-width="8" stroke-linecap="round" stroke-dasharray="4 22"/>

  <!-- Slingshot fork -->
  <g stroke="#7a4a22" stroke-width="20" stroke-linecap="round" fill="none">
    <path d="M150,430 L150,330"/>
    <path d="M150,346 L118,300"/>
    <path d="M150,346 L182,300"/>
  </g>
  <!-- Band + projectile -->
  <line x1="118" y1="300" x2="146" y2="328" stroke="#3a241a" stroke-width="7" stroke-linecap="round"/>
  <line x1="182" y1="300" x2="154" y2="328" stroke="#3a241a" stroke-width="7" stroke-linecap="round"/>
  <circle cx="150" cy="324" r="30" fill="#e8503a"/>
  <circle cx="150" cy="324" r="30" fill="none" stroke="#b53a28" stroke-width="3"/>
  <circle cx="141" cy="316" r="7" fill="rgba(255,255,255,0.6)"/>
</svg>
