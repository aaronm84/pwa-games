<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <!-- Board background (rx swapped to 0 for the full-bleed maskable variant) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#262a38"/>

  <!-- Loop link through the four blue dots -->
  <polyline points="200,200 312,200 312,312 200,312 200,200"
            fill="none" stroke="#cfd6e6" stroke-width="16"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Accent dots -->
  <circle cx="256" cy="110" r="30" fill="#ef5350"/>
  <circle cx="116" cy="150" r="26" fill="#ab47bc"/>
  <circle cx="110" cy="372" r="28" fill="#ffca28"/>
  <circle cx="402" cy="372" r="28" fill="#66bb6a"/>

  <!-- The connected blue loop -->
  <circle cx="200" cy="200" r="34" fill="#42a5f5"/>
  <circle cx="312" cy="200" r="34" fill="#42a5f5"/>
  <circle cx="312" cy="312" r="34" fill="#42a5f5"/>
  <circle cx="200" cy="312" r="34" fill="#42a5f5"/>
</svg>
