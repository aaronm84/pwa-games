<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <!-- Background (rx swapped to 0 for the full-bleed maskable variant) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#1f3a34"/>

  <!-- Track -->
  <path d="M96,286 Q300,150 446,150" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="78" stroke-linecap="round"/>
  <!-- Hole -->
  <circle cx="446" cy="150" r="40" fill="rgba(0,0,0,0.55)"/>

  <!-- Chain marbles heading toward the hole -->
  <g>
    <circle cx="150" cy="262" r="36" fill="#e74c3c"/>
    <circle cx="226" cy="232" r="36" fill="#3498db"/>
    <circle cx="300" cy="206" r="36" fill="#2ecc71"/>
    <circle cx="372" cy="182" r="36" fill="#f1c40f"/>
  </g>

  <!-- Launcher + aim -->
  <line x1="256" y1="438" x2="256" y2="330" stroke="rgba(255,255,255,0.45)" stroke-width="8" stroke-linecap="round" stroke-dasharray="6 16"/>
  <circle cx="256" cy="442" r="40" fill="#cfd8dc"/>
  <circle cx="256" cy="442" r="30" fill="#9b59b6"/>
</svg>
