<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4caf50"/>
      <stop offset="1" stop-color="#1b5e20"/>
    </linearGradient>
  </defs>

  <!-- Background (rx swapped to 0 for the full-bleed maskable variant) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#grass)"/>

  <!-- Mow stripes -->
  <g opacity="0.08" fill="#ffffff">
    <rect x="0" y="96" width="512" height="48"/>
    <rect x="0" y="192" width="512" height="48"/>
    <rect x="0" y="288" width="512" height="48"/>
    <rect x="0" y="384" width="512" height="48"/>
  </g>

  <!-- Putt trajectory -->
  <path d="M300,388 L300,232" fill="none" stroke="rgba(255,255,255,0.55)"
        stroke-width="9" stroke-linecap="round" stroke-dasharray="4 20"/>

  <!-- Cup -->
  <ellipse cx="300" cy="214" rx="30" ry="15" fill="#14261a"/>
  <!-- Flagstick -->
  <line x1="300" y1="210" x2="300" y2="96" stroke="#eceff1" stroke-width="8" stroke-linecap="round"/>
  <!-- Flag -->
  <path d="M300,100 L374,122 L300,144 Z" fill="#e53935"/>

  <!-- Ball shadow + ball -->
  <ellipse cx="300" cy="398" rx="30" ry="12" fill="rgba(0,0,0,0.25)"/>
  <circle cx="300" cy="388" r="30" fill="#ffffff"/>
  <circle cx="290" cy="378" r="9" fill="#e8f5e9"/>
</svg>
