<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <!-- Background (full-bleed/opaque for the maskable variant) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#2a1150"/>

  <!-- Reel window -->
  <rect x="72" y="150" width="368" height="212" rx="20" fill="#0e0722"/>

  <!-- three reels -->
  <g>
    <rect x="92"  y="170" width="104" height="172" rx="12" fill="#1c1140"/>
    <rect x="204" y="170" width="104" height="172" rx="12" fill="#1c1140"/>
    <rect x="316" y="170" width="104" height="172" rx="12" fill="#1c1140"/>
  </g>

  <!-- symbols: 7 / 7 / 7 jackpot line -->
  <g fill="#ff4d6d" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="120" text-anchor="middle">
    <text x="144" y="298">7</text>
    <text x="256" y="298">7</text>
    <text x="368" y="298">7</text>
  </g>

  <!-- gold pay line -->
  <rect x="82" y="252" width="348" height="8" rx="4" fill="#ffd54f" opacity="0.85"/>

  <!-- cherries below (the win) -->
  <g>
    <circle cx="212" cy="410" r="20" fill="#e33b4e"/>
    <circle cx="256" cy="418" r="20" fill="#e33b4e"/>
    <path d="M212,390 Q250,360 300,372" stroke="#2e7d32" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M256,398 Q288,372 300,372" stroke="#2e7d32" stroke-width="7" fill="none" stroke-linecap="round"/>
  </g>

  <!-- coin accent top-left -->
  <circle cx="256" cy="112" r="30" fill="#ffcf3f" stroke="#e0a91e" stroke-width="5"/>
  <text x="256" y="126" fill="#b8860b" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="38" text-anchor="middle">$</text>
</svg>
