<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <!-- Board background (rx swapped to 0 for the full-bleed maskable variant) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#1f2a44"/>

  <!-- Mine spikes -->
  <g stroke="#0d1118" stroke-width="26" stroke-linecap="round">
    <line x1="256" y1="140" x2="256" y2="392"/>
    <line x1="130" y1="266" x2="382" y2="266"/>
    <line x1="167" y1="177" x2="345" y2="355"/>
    <line x1="345" y1="177" x2="167" y2="355"/>
  </g>
  <!-- Mine body -->
  <circle cx="256" cy="266" r="98" fill="#0d1118"/>
  <circle cx="222" cy="232" r="22" fill="#ffffff" fill-opacity="0.4"/>

  <!-- Little red flag accent -->
  <g transform="translate(348,120)">
    <rect x="-4" y="-44" width="8" height="92" rx="4" fill="#cfd8e3"/>
    <path d="M4,-44 L60,-26 L4,-8 Z" fill="#e53935"/>
  </g>
</svg>
