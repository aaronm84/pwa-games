<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <!-- Background (full-bleed/opaque so it works as a maskable icon) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#16314f"/>

  <!-- Winding path -->
  <path d="M120,40 L120,180 L392,180 L392,330 L120,330 L120,480"
        fill="none" stroke="rgba(0,0,0,0.32)" stroke-width="64"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M120,40 L120,180 L392,180 L392,330 L120,330 L120,480"
        fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="40"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Enemies marching along the top lane -->
  <circle cx="180" cy="180" r="22" fill="#ef5350"/>
  <circle cx="250" cy="180" r="22" fill="#ef5350"/>
  <circle cx="320" cy="180" r="18" fill="#ffb300"/>

  <!-- Tower firing at the lane -->
  <g>
    <circle cx="300" cy="300" r="46" fill="rgba(0,0,0,0.4)"/>
    <circle cx="300" cy="300" r="38" fill="#5fd0e0"/>
    <rect x="288" y="232" width="24" height="62" rx="6" fill="#0d2238"/>
    <circle cx="300" cy="216" r="12" fill="#ffe082"/>
  </g>
</svg>
