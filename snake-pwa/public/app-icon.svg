<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <!-- Board background (rx swapped to 0 for the full-bleed maskable variant) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#163a1f"/>

  <!-- Snake body -->
  <polyline points="132,170 132,372 380,372 380,176"
            fill="none" stroke="#57b85e" stroke-width="58"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- brighter head segment -->
  <circle cx="380" cy="168" r="34" fill="#9be7a0"/>
  <circle cx="369" cy="158" r="6.5" fill="#10331a"/>
  <circle cx="391" cy="158" r="6.5" fill="#10331a"/>

  <!-- Apple -->
  <circle cx="380" cy="80" r="30" fill="#e53935"/>
  <circle cx="372" cy="72" r="9" fill="#ff8a80"/>
  <rect x="376" y="48" width="8" height="16" rx="4" fill="#6d4c41"/>
  <ellipse cx="396" cy="52" rx="14" ry="8" fill="#43a047" transform="rotate(20 396 52)"/>
</svg>
