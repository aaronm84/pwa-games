<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="felt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2d6a4f"/>
      <stop offset="1" stop-color="#1b4332"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Card-table background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#felt)"/>

  <!-- Back card (red king of hearts, fanned left) -->
  <g transform="rotate(-14 256 286)" filter="url(#cardShadow)">
    <rect x="150" y="150" width="160" height="232" rx="20" fill="#f7f7f7"/>
    <text x="172" y="196" font-family="Georgia, 'Times New Roman', serif" font-size="46"
          font-weight="700" fill="#e23b3b">K</text>
    <text x="230" y="300" font-family="Georgia, 'Times New Roman', serif" font-size="120"
          font-weight="700" fill="#e23b3b" text-anchor="middle">&#9829;</text>
  </g>

  <!-- Front card (black ace of spades, fanned right) -->
  <g transform="rotate(11 270 300)" filter="url(#cardShadow)">
    <rect x="208" y="160" width="168" height="244" rx="20" fill="#ffffff"/>
    <text x="232" y="208" font-family="Georgia, 'Times New Roman', serif" font-size="48"
          font-weight="700" fill="#1d1d1d">A</text>
    <text x="292" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="128"
          font-weight="700" fill="#1d1d1d" text-anchor="middle">&#9824;</text>
  </g>
</svg>
