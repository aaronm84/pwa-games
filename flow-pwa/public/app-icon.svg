<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <!-- Board background (rx swapped to 0 for the full-bleed maskable variant) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#16213e"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="2">
    <line x1="176" y1="56" x2="176" y2="456"/>
    <line x1="296" y1="56" x2="296" y2="456"/>
    <line x1="56" y1="176" x2="456" y2="176"/>
    <line x1="56" y1="296" x2="456" y2="296"/>
  </g>

  <!-- Red flow: top-left down then across to bottom-right -->
  <polyline points="116,116 116,396 396,396" fill="none" stroke="#e6194b"
            stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="116" cy="116" r="40" fill="#e6194b"/>
  <circle cx="396" cy="396" r="40" fill="#e6194b"/>

  <!-- Cyan flow: top-right in then down -->
  <polyline points="396,116 256,116 256,256" fill="none" stroke="#42d4f4"
            stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="396" cy="116" r="40" fill="#42d4f4"/>
  <circle cx="256" cy="256" r="40" fill="#42d4f4"/>
</svg>
